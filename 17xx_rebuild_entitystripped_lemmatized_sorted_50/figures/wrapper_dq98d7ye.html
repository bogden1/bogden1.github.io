    <text class="gtitle" x="35" y="50" dy="0em" fill="rgb(42, 63, 95)" font-family="'Open Sans', verdana, arial, sans-serif" font-size="10px" style="white-space:pre">An essay towards a natural history of serpents. In two parts. I. The first exhibits a general view of serpents, in their various aspects...The second gives a view of most serpents known in the several parts of the world... III. To which is added a third part; containing six dissertations upon the following articles. 1. Upon the primeval serpent in paradise. 2. The fiery serpents that infested the camp of Israel. 3. The brazen serpent erected by Moses. 4. The divine worship given to serpents by the nations. 5. The origin and reason of that monstrous worship. 6. Upon the adoration of different kinds of beasts by the Egyptians ... The whole intermix'd with variety of entertaining digressions, philosophical and historical / By Charles Owen, D. D. (dq98d7ye)</text>
