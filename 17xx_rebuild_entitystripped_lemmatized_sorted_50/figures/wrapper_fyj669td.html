  <g class="g-gtitle">
   <a xlink:href="https://wellcomecollection.org/works//fyj669td">
    <text class="gtitle" x="35" y="50" dy="0em" fill="rgb(42, 63, 95)" font-family="'Open Sans', verdana, arial, sans-serif" font-size="10px" style="white-space:pre">New discoveries and improvements in the most considerable branches of anatomy and surgery. Wherein four of the most dangerous operations are prevented, viz. I. The great use of the curvecatheter, in a suppression of urine, and easing the racking pain of the stone in the bladder. II. Ruptures cured without cutting. III. The divided tendon cured without stitching. IV. The white-swelling cured without dismembering. V. The best method for the reduction of fractures, and dislocations. VI. The nature of gunshot, and other wounds; and of the errors commited in bleeding. VII. The true seat of the gonorrhoea demonstrated; and cure of the venereal disease. VIII. Of the circulation of the blood in the foetus, and the nourishment thereof. IX. Of the parts of generation in women, etc. The whole proposed by way of instruction; and illustrated with cases and cures / [Alexander Stuart]. (fyj669td)</text>
