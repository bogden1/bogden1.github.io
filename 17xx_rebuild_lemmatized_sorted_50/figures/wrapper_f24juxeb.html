    <text class="gtitle" x="35" y="50" dy="0em" fill="rgb(42, 63, 95)" font-family="'Open Sans', verdana, arial, sans-serif" font-size="10px" style="white-space:pre">The history of many memorable things lost, which were in use among the ancients: and an account of many excellent things found, now in use among the moderns, both natural and artificial / Written originally in Latin, by Guido Pancirollus; and now done into English, and illustrated with a new commentary of choice remarks ... from Salmuth's large annotations ... To this English edition is added, first, a supplement to the chapter of printing, shewing the time of its beginning, and the first book printed in each city before the year 1500. Secondly, what the moderns have found, the ancients never knew: extracted from Dr. Sprat's ... History of the Royal-society, the writings of the Honourable Mr. Boyle, the Royal-academy at Paris, &amp;c. Thirdly, an index to the whole. (f24juxeb)</text>
