    <text class="gtitle" x="35" y="50" dy="0em" fill="rgb(42, 63, 95)" font-family="'Open Sans', verdana, arial, sans-serif" font-size="10px" style="white-space:pre">A short account of several excellent medicines lately discovered in the argol or tartar; : together with its preparations; viz. the volatile salt, oil, spirit, and fixed salt. To which are annexed, divers remarkable instances of the efficacy of these noble medicines in the following disorders: the raw chrystals, in fits, convulsions, head-ach, &amp;c. The volatile salt, in the consumption, scurvy, weakness of the nerves, venereal distemper, obstruction of the menses, weakness of the stomach, &amp;c. The spirit, in the dropsy, obstructions, lowness of spirits, fainting, &amp;c. The oil, in the gout, asthma, rheumatism, &amp;c. The fixed salt, in the stone, gravel, &amp;c... / By Wm. Taube, Dove. (bn43fmne)</text>
