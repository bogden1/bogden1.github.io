   <a xlink:href="https://wellcomecollection.org/works//sgukpgcv">
    <text class="gtitle" x="35" y="50" dy="0em" fill="rgb(42, 63, 95)" font-family="'Open Sans', verdana, arial, sans-serif" font-size="10px" style="white-space:pre">A dissertation on the effects of mercury on human bodies, in the cure of the venereal disease. With a comparative view of the methods by salivation, unction, and purgation, and the more effectual manner of cure, by the use of the mercurial ointment, without either salivating of purging, as practised at Montpelier and now at Paris, by the learned Doctors Astruc and Cantwell, whereby the train of direful symptoms attending salivation are happily avoided, as also the inconveniences of purgation. To which is added, the extraordinary case of John Bodle, a dragoon in Lord Mark Ker's regiment, who was wounded at Clifton Moor ... containing some animadversions on the use of the bark, wherein it is proved, not to be that universal remedy in all constitutions labouring under gun shot wounds ... / Together with some remarks and observations of the author with respect to the effects of an instrument lately invented by him. (sgukpgcv)</text>
