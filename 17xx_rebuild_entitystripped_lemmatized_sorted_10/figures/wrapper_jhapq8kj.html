    <text class="gtitle" x="35" y="50" dy="0em" fill="rgb(42, 63, 95)" font-family="'Open Sans', verdana, arial, sans-serif" font-size="10px" style="white-space:pre">A treatise on the Deluge. Containing: I. Remarks on the Lord Bishop of Clogher's account. Of that event. II. A full explanation of the scripture history of it. III. A collection of all. The principal heathen accounts. IV. Natural proofs of the Deluge. Deduced from a great variety of circumstances, on and in the terraqueous globe. And, under the foregoing general articles, the following particulars will be occasionally discussed and proved, viz. The time when, and the manner how America wa first peopled.--The Mosaic account of the deluge written by inspiration.--the certainty of an abyss of water within the earth.--The reality of an inner globe or central nucleus.--The cause of the subterranean vapour, and of earthquakes.--The origin of springs, lakes, &amp;c.--The formation of mountains, hills, dales, vallies, &amp;c.--The means by which the bed of the ocean was formed.--The cause of caverns or natural grottos; with a description of the most remarkable, especially those in England.--Also an explication of several lesser phænomena in nature... / [Alexander Catcott]. (jhapq8kj)</text>
