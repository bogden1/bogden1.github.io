    <text class="gtitle" x="35" y="50" dy="0em" fill="rgb(42, 63, 95)" font-family="'Open Sans', verdana, arial, sans-serif" font-size="10px" style="white-space:pre">The general and particular principles of animal electricity and magnetism, &amp;c. in which are found Dr. Bell's secrets and practice, as Delivered To His Pupils In Paris, London, Dublin, Bristol, Glocester, Worcester, Birmingham, Wolverhampton, Shrewsbury, Chester, Liverpool, Manchester, &amp;c.&amp;c. Shewing how to Magnetise and Cure different Diseases; to produce Crises, as well as Somnambulism, or Sleep-Walking; and in that State of Sleep to make a Person eat, drink, walk, sing and play upon any Instruments they are used to, &amp;c. to make Apparatus and other Accessaries to produce Magnetical Facts; also to Magnetise Rivers, Rooms, Trees, and other Bodies, animate and inanimate; to raise the Arms, Legs of a Person awake, and to make him rise from his Chair; to raise the Arm of a Person absent from one Room to another; also to treat him at a Distance. All the New Experiments and Phenomena are explained / by Monsieur le Docteur Bell, Professor of that Science, And Member of the Philosophical Harmonic Society at Paris, Fellow Correspondent of M. Le Court de Geblin's Museum; and the only Person authorised by Patent from the First Noblemen in France, to teach and practise that Science in England, Ireland, &amp;c. (a6bzk9rw)</text>
